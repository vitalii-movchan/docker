version: '3.3'

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  laravel-network:
    driver: bridge

services:
  cerbot:
    build:
      context: .
      dockerfile: docker/cerbot/Dockerfile
    container_name: laravel-cerbot
    volumes:
      - ./:/var/www/laravel
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - web
  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: laravel-nginx
    volumes:
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
      - ./:/var/www/laravel
    networks:
      - laravel-network
    ports:
      - "${SERVER_PORT:-80}:80"
      - "${SERVER_SSL_PORT:-443}:443"
    restart: on-failure
    tty: true
    depends_on:
      - app
  app:
    build:
      context: .
      dockerfile: docker/php-fpm/app/Dockerfile
      args:
        USER_ID: "${USER_ID:-1000}"
        USER_NAME: "${USER_NAME:-laravel}"
        GROUP_ID: "${GROUP_ID:-1000}"
        GROUP_NAME: "${GROUP_NAME:-laravel}"
    container_name: laravel-app
    volumes:
      - ./:/var/www/laravel
    networks:
      - laravel-network
    restart: on-failure
    tty: true
    depends_on:
      - db
      - cache
  db:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    container_name: laravel-mysql
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/scripts:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    networks:
      - laravel-network
    ports:
      - "${DB_PORT:-3306}:3306"
    restart: on-failure
    tty: true
  cache:
    build:
      context: .
      dockerfile: docker/redis/Dockerfile
    container_name: laravel-redis
    volumes:
      - redis-data:/data
    networks:
      - laravel-network
    restart: on-failure
    tty: true
    ports:
      - "${REDIS_PORT:-6379}:6379"
