server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/app.help-desk/error.log;
    access_log /var/log/nginx/app.help-desk/access.log;
    root /var/www/app.help-desk/public;

    server_name app.help-desk.local www.app.help-desk.local app.help-desk.ai www.app.help-desk.ai;

    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/app.help-desk;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app-admin:9001;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
