# cd /etc/nginx/sites-available
# cat wordpress.conf
server {
    listen 80 default_server;
    root /var/www/help-desk;
    index index.php index.html;

    server_name help-desk.local www.help-desk.local help-desk.ai www.help-desk.ai;

	access_log /var/log/nginx/help-desk/access.log;
    error_log /var/log/nginx/help-desk/error.log;

    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/help-desk;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app-land:9002;
        include fastcgi_params;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\.ht {
        deny all;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires max;
        log_not_found off;
    }
}