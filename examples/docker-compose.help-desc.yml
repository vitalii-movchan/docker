version: '3.3'

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  help-desc-network:
    driver: bridge

services:
  cerbot:
    build:
      context: .
      dockerfile: docker/cerbot/Dockerfile
    container_name: help-desc-cerbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./sites/help-desk/:/var/www/help-desk
      - ./sites/app.help-desk/:/var/www/app.help-desk
    depends_on:
      - web
  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: help-desc-nginx
    volumes:
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
      - ./sites/help-desk/:/var/www/help-desk
      - ./sites/app.help-desk/:/var/www/app.help-desk
    networks:
      - help-desc-network
    ports:
      - "${SERVER_PORT:-80}:80"
      - "${SERVER_SSL_PORT:-443}:443"
    restart: on-failure
    tty: true
    depends_on:
      - app-admin
      - app-land
  app-admin:
    build:
      context: .
      dockerfile: docker/php-fpm/app.help-desk/Dockerfile
      args:
        USER_ID: "${USER_ID:-1000}"
        USER_NAME: "${USER_NAME:-tsusa}"
        GROUP_ID: "${GROUP_ID:-1000}"
        GROUP_NAME: "${GROUP_NAME:-tsusa}"
    container_name: help-desc-app-admin
    volumes:
      - ./sites/app.help-desk/:/var/www/app.help-desk
    networks:
      - help-desc-network
    restart: on-failure
    tty: true
    depends_on:
      - db
      - cache
  app-land:
    build:
      context: .
      dockerfile: docker/php-fpm/help-desk/Dockerfile
      args:
        USER_ID: "${USER_ID:-1000}"
        USER_NAME: "${USER_NAME:-tsusa}"
        GROUP_ID: "${GROUP_ID:-1000}"
        GROUP_NAME: "${GROUP_NAME:-tsusa}"
    container_name: help-desc-app-land
    volumes:
      - ./sites/help-desk/:/var/www/help-desk
      - ./docker/php-fpm/help-desk/usr/local/etc/php/conf.d/php.ini:/usr/local/etc/php/conf.d/php.ini
    networks:
      - help-desc-network
    restart: on-failure
    tty: true
    depends_on:
      - db
      - cache
  db:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    container_name: help-desc-mysql
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    networks:
      - help-desc-network
    ports:
      - "${DB_PORT:-3306}:3306"
    restart: on-failure
    tty: true
  cache:
    build:
      context: .
      dockerfile: docker/redis/Dockerfile
    container_name: help-desc-redis
    volumes:
      - redis-data:/data
    networks:
      - help-desc-network
    restart: on-failure
    tty: true
    ports:
      - "${REDIS_PORT:-6379}:6379"